<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1118" />
    <title>UQ Reality Labs</title>
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="stylesheet" href="/app/styles.css" />
  </head>
  <body>
    <nav id="navbar" aria-label="Main">
      <a href="#" class="nav-logo" data-section="0">
        <img id="nav-logo-img" src="" alt="UQ Reality Labs logo" />
      </a>
      <div id="nav-links" class="nav-links"></div>
    </nav>
    <canvas id="canvas" aria-label="Interactive UQ Reality Labs 3D scene"></canvas>
    <div id="chalk-layer" aria-hidden="true">
      <svg class="bee-trail bee-trail--join" viewBox="0 0 220 120" focusable="false">
        <path class="bee-trail__ghost" d="M12 88 C36 18 72 104 94 58 C116 12 146 116 174 52 C190 20 204 38 214 70" />
        <path id="bee-trail-join" class="bee-trail__path" d="M12 88 C36 18 72 104 94 58 C116 12 146 116 174 52 C190 20 204 38 214 70" />
        <text class="bee-trail__label" x="118" y="30">JOIN us</text>
        <g class="bee-trail__dot bee-trail__bee">
          <animateMotion dur="3.1s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear" rotate="auto">
            <mpath href="#bee-trail-join" />
          </animateMotion>
          <ellipse class="bee-trail__bee-body" cx="0" cy="0" rx="4.4" ry="3" />
          <path class="bee-trail__bee-stripe" d="M-1.8 -2.1 V2.1 M1.8 -2.1 V2.1" />
          <path class="bee-trail__bee-wing bee-trail__bee-wing--left" d="M-1.6 -2.2 C-4.5 -5.8 -2.1 -7.2 0.6 -4.5" />
          <path class="bee-trail__bee-wing bee-trail__bee-wing--right" d="M1.5 -2.2 C4.2 -5.8 2 -7.2 -0.4 -4.6" />
        </g>
      </svg>
      <svg class="bee-trail bee-trail--social" viewBox="0 0 240 110" focusable="false">
        <path class="bee-trail__ghost" d="M14 72 C42 18 82 92 104 48 C128 2 156 96 182 48 C204 10 222 18 232 36" />
        <path id="bee-trail-social" class="bee-trail__path" d="M14 72 C42 18 82 92 104 48 C128 2 156 96 182 48 C204 10 222 18 232 36" />
        <text class="bee-trail__label" x="18" y="24">buzz buzz</text>
        <g class="bee-trail__dot bee-trail__bee">
          <animateMotion dur="3.4s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear" rotate="auto">
            <mpath href="#bee-trail-social" />
          </animateMotion>
          <ellipse class="bee-trail__bee-body" cx="0" cy="0" rx="4" ry="2.75" />
          <path class="bee-trail__bee-stripe" d="M-1.6 -2 V2 M1.6 -2 V2" />
          <path class="bee-trail__bee-wing bee-trail__bee-wing--left" d="M-1.4 -2 C-4.2 -5.3 -1.9 -6.8 0.5 -4.2" />
          <path class="bee-trail__bee-wing bee-trail__bee-wing--right" d="M1.3 -2 C4 -5.3 1.7 -6.8 -0.3 -4.3" />
        </g>
      </svg>
      <svg class="bee-trail bee-trail--committee" viewBox="0 0 260 130" focusable="false">
        <path class="bee-trail__ghost" d="M18 94 C48 18 92 122 122 62 C154 4 184 120 218 58 C238 20 250 34 254 54" />
        <path id="bee-trail-committee" class="bee-trail__path" d="M18 94 C48 18 92 122 122 62 C154 4 184 120 218 58 C238 20 250 34 254 54" />
        <text class="bee-trail__label" x="36" y="42">crew?</text>
        <g class="bee-trail__dot bee-trail__bee">
          <animateMotion dur="3.2s" repeatCount="indefinite" keyPoints="0;1;0" keyTimes="0;0.5;1" calcMode="linear" rotate="auto">
            <mpath href="#bee-trail-committee" />
          </animateMotion>
          <ellipse class="bee-trail__bee-body" cx="0" cy="0" rx="4.3" ry="2.95" />
          <path class="bee-trail__bee-stripe" d="M-1.7 -2.05 V2.05 M1.7 -2.05 V2.05" />
          <path class="bee-trail__bee-wing bee-trail__bee-wing--left" d="M-1.5 -2.1 C-4.3 -5.6 -2 -7 0.5 -4.4" />
          <path class="bee-trail__bee-wing bee-trail__bee-wing--right" d="M1.4 -2.1 C4.1 -5.6 1.8 -7 -0.3 -4.5" />
        </g>
      </svg>
      <svg class="bee-trail bee-trail--join-sad" viewBox="0 0 180 120" focusable="false">
        <path class="bee-trail__ghost" d="M18 74 C44 42 66 94 92 64 C116 36 132 64 154 42" />
        <path class="bee-trail__path" d="M18 74 C44 42 66 94 92 64 C116 36 132 64 154 42" />
        <text class="bee-trail__label" x="18" y="28">aw.</text>
        <circle class="bee-trail__sad-eye" cx="76" cy="88" r="3.4" />
        <circle class="bee-trail__sad-eye" cx="104" cy="88" r="3.4" />
        <path class="bee-trail__sad-mouth" d="M78 108 Q90 96 102 108" />
      </svg>
    </div>
    <div id="member-popup" class="member-popup" hidden>
      <div class="member-popup__backdrop" data-popup-close></div>
      <article class="member-popup__card" role="dialog" aria-modal="true" aria-labelledby="member-popup-title" tabindex="-1">
        <button class="member-popup__close" type="button" aria-label="Close profile" data-popup-close>&times;</button>
        <img id="member-popup-image" alt="" width="900" height="900" loading="lazy" decoding="async" sizes="(max-width: 860px) 82vw, 9rem" />
        <div>
          <h2 id="member-popup-title"></h2>
          <p id="member-popup-role"></p>
          <p id="member-popup-copy" class="member-popup__copy"></p>
          <a id="member-popup-link" target="_blank" rel="noopener noreferrer">View LinkedIn profile</a>
        </div>
      </article>
    </div>
    <div id="status" hidden></div>
    <script type="module" src="/app/main.js"></script>
  </body>
</html>
