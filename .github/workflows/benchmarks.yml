name: Benchmarks

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: benchmarks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  benchmark-build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Collect build benchmark
        run: npm run benchmark:build
      - name: Add benchmark summary
        run: |
          set -euo pipefail
          cat artifacts/benchmarks/build.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-build
          path: artifacts/benchmarks/
          if-no-files-found: error
          retention-days: 14

  benchmark-lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: benchmark-build
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build app
        run: npm run build
      - name: Start preview server
        run: |
          set -euo pipefail
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/rsbuild-preview.log 2>&1 &
          preview_pid=$!
          echo "PREVIEW_PID=$preview_pid" >> "$GITHUB_ENV"

          for attempt in {1..30}; do
            if ! kill -0 "$preview_pid" 2>/dev/null; then
              cat /tmp/rsbuild-preview.log
              exit 1
            fi
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null 2>&1; then
              exit 0
            fi
            sleep 1
          done

          cat /tmp/rsbuild-preview.log
          exit 1
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # 12.6.2
        with:
          configPath: ./tools/configs/lighthouserc.json
          uploadArtifacts: false
          temporaryPublicStorage: false
      - name: Upload Lighthouse artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse
          path: artifacts/lighthouse/
          if-no-files-found: ignore
          retention-days: 14
