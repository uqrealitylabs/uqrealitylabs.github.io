name: CI

on:
  pull_request:
  push:
    branches: [main, better-resp, robotic-bees]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run quality gate
        run: npm run ci:quality

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build and check budgets
        run: npm run ci:build
      - name: Add build summary
        run: |
          set -euo pipefail
          if [ -f artifacts/benchmarks/build.md ]; then
            cat artifacts/benchmarks/build.md >> "$GITHUB_STEP_SUMMARY"
          fi
  cypress-component:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Cypress component tests
        run: npm run test:component
      - name: Upload Cypress failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cypress-component-failure
          path: |
            cypress/screenshots
            cypress/videos
          if-no-files-found: ignore
          retention-days: 7

  cypress-e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 1
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build production app
        run: npm run build
      - name: Run Cypress E2E against preview
        run: |
          set -euo pipefail
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/rsbuild-preview.log 2>&1 &
          preview_pid=$!
          trap 'kill "$preview_pid" 2>/dev/null || true' EXIT

          for attempt in {1..30}; do
            if ! kill -0 "$preview_pid" 2>/dev/null; then
              cat /tmp/rsbuild-preview.log
              exit 1
            fi
            if curl --fail --silent http://127.0.0.1:4173/ > /dev/null 2>&1; then
              npm run test:e2e -- --config baseUrl=http://127.0.0.1:4173
              exit 0
            fi
            sleep 1
          done

          cat /tmp/rsbuild-preview.log
          exit 1
      - name: Upload Cypress failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: cypress-e2e-failure
          path: |
            cypress/screenshots
            cypress/videos
          if-no-files-found: ignore
          retention-days: 7
