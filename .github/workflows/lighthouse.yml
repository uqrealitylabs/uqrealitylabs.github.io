name: Lighthouse

on:
  schedule:
    - cron: "41 5 * * 1"
  workflow_dispatch:

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts --no-audit

      - name: Build
        run: npm run build

      - name: Compile Lighthouse config
        run: npx tsc --module NodeNext --moduleResolution NodeNext --target ES2022 --outDir "$RUNNER_TEMP/lhci-config" config/lighthouserc.cts

      - name: Run Lighthouse CI
        run: npx --yes @lhci/cli autorun --config="$RUNNER_TEMP/lhci-config/lighthouserc.cjs"
