name: Rust Tooling Quality

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rust-tooling-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MISE_VERSION: 2026.7.7
  MISE_SHA256: 429f71e7e989908bf975aafac9066329c16e2d8fc7cd8e74fdf21dd6300ffe7c

jobs:
  format:
    name: Rust Tooling / Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with: { version: ${{ env.MISE_VERSION }}, sha256: ${{ env.MISE_SHA256 }}, cache: true }
      - run: mise run format-check
  lint:
    name: Rust Tooling / Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with: { version: ${{ env.MISE_VERSION }}, sha256: ${{ env.MISE_SHA256 }}, cache: true }
      - run: mise run lint
  spelling:
    name: Rust Tooling / Spelling
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with: { version: ${{ env.MISE_VERSION }}, sha256: ${{ env.MISE_SHA256 }}, cache: true }
      - run: mise run spell
  workflows:
    name: Rust Tooling / Workflows
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with: { version: ${{ env.MISE_VERSION }}, sha256: ${{ env.MISE_SHA256 }}, cache: true }
      - run: mise run workflow-check
  typecheck:
    name: Rust Tooling / Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with: { version: ${{ env.MISE_VERSION }}, sha256: ${{ env.MISE_SHA256 }}, cache: true }
      - run: mise run setup
      - run: mise run typecheck
  test:
    name: Rust Tooling / Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with: { version: ${{ env.MISE_VERSION }}, sha256: ${{ env.MISE_SHA256 }}, cache: true }
      - run: mise run setup
      - run: mise run test
  build:
    name: Rust Tooling / Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4.2.2
      - uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with: { version: ${{ env.MISE_VERSION }}, sha256: ${{ env.MISE_SHA256 }}, cache: true }
      - run: mise run setup
      - run: mise run build
