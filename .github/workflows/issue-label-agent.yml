name: Issue label agent

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  contents: read
  issues: write

concurrency:
  group: issue-label-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc

      - name: Run AI labeler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AI_LABELER_API_KEY: ${{ secrets.AI_LABELER_API_KEY }}
          AI_LABELER_BASE_URL: ${{ vars.AI_LABELER_BASE_URL }}
          AI_LABELER_MODEL: ${{ vars.AI_LABELER_MODEL }}
        run: npx --yes tsx tools/agents/issue-label-agent.ts
