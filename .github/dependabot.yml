version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "08:00"
      timezone: Australia/Brisbane
    groups:
      dev-tooling:
        dependency-type: development
      runtime-minor-patch:
        update-types: [minor, patch]
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "08:30"
      timezone: Australia/Brisbane
    open-pull-requests-limit: 5
